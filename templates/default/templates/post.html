<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{site.name}}</title>
  {{#if description}}<meta name="description" content="{{description}}">{{/if}}
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .prose { max-width: 65ch; }
    .prose h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .prose h2 { font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.5rem; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .prose p { margin-bottom: 1rem; line-height: 1.75; }
    .prose ul, .prose ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .prose li { margin-bottom: 0.25rem; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1.5rem 0; }
    .prose blockquote { border-left: 3px solid #d1d5db; padding-left: 1rem; color: #6b7280; margin: 1.5rem 0; }
    .prose code { background: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875em; }
    .prose pre { background: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1.5rem 0; }
    .prose pre code { background: none; padding: 0; }
  </style>
</head>
<body class="bg-white text-gray-900 min-h-screen">
  {{> header}}
  <main class="px-4 py-8 mx-auto max-w-3xl">
    <article>
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight">{{title}}</h1>
        {{#if date}}
        <time class="text-sm text-gray-500 mt-2 block" datetime="{{date}}">{{formatDate date}}</time>
        {{/if}}
        {{#if description}}
        <p class="text-gray-600 mt-3 text-lg">{{description}}</p>
        {{/if}}
      </header>
      <div class="prose">
        {{{content}}}
      </div>
    </article>
  </main>
  {{> footer}}
</body>
</html>
